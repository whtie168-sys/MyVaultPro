workflows:
  ios-native-quick-start:
    name: Bearing Atlas Pro
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: FEWWS
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.BearingAtlasPro.RS
      vars:
        BUNDLE_ID: com.BearingAtlasPro.RS
        APP_STORE_APPLE_ID: 6779721978
        XCODE_WORKSPACE: "Bearing Atlas Pro.xcworkspace"
        XCODE_SCHEME: "Bearing Atlas Pro"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install --repo-update
          # 修复可能的脚本错误
          if [ -d "Pods/Target Support Files" ]; then
            find Pods/Target\ Support\ Files -name "*-frameworks.sh" -exec sed -i.bak '2i set +u' {} \;
          fi

      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - 985446278@qq.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_app_store: true
